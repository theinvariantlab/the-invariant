<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0F2F5;--navy:#1C2B4A;--steel:#4A6FA5;--pale:#DCE8F5;
  --muted:#6B7A96;--border:#D4DCEA;--red:#C94040;--grey:#9AA3B0;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;width:700px;user-select:none;}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);}
#pub-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
#counter-wrap{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
#pt-bar-wrap{width:120px;height:8px;background:var(--border);border-radius:4px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,0.08);}
#pt-bar{height:8px;background:var(--steel);width:0%;transition:width .25s;border-radius:4px;}
#question-band{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:10px;}
#question-text{font-family:'DM Serif Display',serif;font-size:17px;color:var(--navy);letter-spacing:-.01em;}
#canvas-wrap{position:relative;width:700px;height:400px;}
#rc{display:block;}
#botbar{border-top:1px solid var(--border);background:var(--bg);padding:10px 18px;display:flex;flex-direction:column;gap:8px;}
#btn-row{display:flex;align-items:center;gap:8px;}
#legend-row{display:flex;gap:16px;min-height:14px;align-items:center;}
#spd-cycle{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;padding:5px 14px;border:1px solid var(--border);border-radius:3px;background:#fff;color:var(--navy);cursor:pointer;transition:all .15s;text-align:center;}
#spd-cycle:hover{background:var(--pale);border-color:var(--steel);}
#spd-cycle:active{transform:scale(.97);}
#btn-wall{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:6px 20px;background:var(--navy);color:#fff;border:none;border-radius:3px;cursor:pointer;transition:background .2s,transform .1s;}
#btn-wall:hover{background:var(--steel);}
#btn-wall:active{transform:scale(.97);}
#btn-replay{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:6px 16px;background:var(--muted);color:#fff;border:none;border-radius:3px;cursor:pointer;transition:background .2s;display:none;}
#btn-replay:hover{background:var(--steel);}
.leg{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;opacity:0;transition:opacity .6s;}
.leg.show{opacity:1;}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>

<div id="topbar">
  <span id="pub-label">← The Invariant · RANSAC</span>
  <div id="counter-wrap">
    <span id="pt-label">0 / 100 pts</span>
    <div id="pt-bar-wrap"><div id="pt-bar"></div></div>
  </div>
</div>

<div id="question-band">
  <span id="question-text">Where is the wall?</span>
</div>

<div id="canvas-wrap">
  <canvas id="rc" width="700" height="400"></canvas>
</div>

<div id="botbar">
  <div id="btn-row">
    <button id="spd-cycle" onclick="cycleSpeed()">Adjust speed 1×</button>
    <button id="btn-replay" onclick="location.reload()">↺ Replay</button>
    <button id="btn-wall" onclick="toggleWall()">Reveal wall</button>
  </div>
  <div id="legend-row">
    <div class="leg show" id="leg-obj"><div class="leg-dot" style="background:var(--muted)"></div>object</div>
    <div class="leg" id="leg-noise"><div class="leg-dot" style="background:var(--red)"></div>sensor error</div>
  </div>
</div>

<script>
(function(){
const CV=document.getElementById('rc');
const ctx=CV.getContext('2d');
const W=700,H=400;
const C={bg:'#F0F2F5',navy:'#1C2B4A',steel:'#4A6FA5',pale:'#DCE8F5',
         muted:'#6B7A96',border:'#D4DCEA',red:'#C94040',grey:'#9AA3B0'};

// ── WALL ─────────────────────────────────────────────────────────────────
// Diagonal: bottom-left → top-right (slightly inside canvas edges)
const wA={x:15, y:415};
const wB={x:685, y:-15};
const wVec={x:wB.x-wA.x, y:wB.y-wA.y};
const wLen=Math.hypot(wVec.x,wVec.y);
const wDir={x:wVec.x/wLen, y:wVec.y/wLen};
const wNrm={x:-wDir.y, y:wDir.x}; // points upper-left (bedroom side)
const WTHK=14;
const DOOR_S=0.42, DOOR_E=0.57;
function wPt(t){return{x:wA.x+t*wVec.x,y:wA.y+t*wVec.y};}
function projWall(px,py){
  const dx=px-wA.x,dy=py-wA.y;
  const t=(dx*wDir.x+dy*wDir.y)/wLen;
  const dist=dx*wNrm.x+dy*wNrm.y;
  return{t,dist};
}
function inDoor(t){return t>=DOOR_S&&t<=DOOR_E;}

// ── FURNITURE ────────────────────────────────────────────────────────────
// The wall diagonal roughly splits:
//   upper-left (bedroom): points where (x - (W-y)) < -100  →  y > x - 300  roughly
//   lower-right (living): points where (x - (W-y)) > 100
//
// Safe bedroom zone (upper-left of diagonal):
//   x+y < 350 gives large upper-left region
// Safe living room zone (lower-right):
//   x+y > 550 gives large lower-right region
//
// Bed: top-left corner → x:18 y:20 → x+y=38 ✓ bedroom
// Wardrobe: left side middle → x:18 y:200 → x+y=218 ✓ bedroom
// Sofa: bottom-right → x:430 y:290 → x+y=720 ✓ living
// Plant: far right mid → x:620 y:200 → x+y=820 ✓ living  
// Coffee table: bottom-right → x:450 y:330 → x+y=780 ✓ living

const bed       = {x:18,  y:18,  w:165, h:125};  // bedroom top-left
const wardrobe  = {x:18,  y:195, w:62,  h:110};  // bedroom left side
const sofa      = {x:435, y:290, w:185, h:68};   // living bottom-right
const plantBox  = {x:618, y:190, w:28,  h:82};   // living right side
const coffeeTable={x:450, y:230, w:80,  h:42};   // living bottom-right

// ── DUST ─────────────────────────────────────────────────────────────────
const dustClusters=[];
(function(){
  [{cx:120,cy:200},{cx:580,cy:340},{cx:340,cy:280}].forEach(s=>{
    dustClusters.push({cx:s.cx,cy:s.cy,active:true,
      dots:Array.from({length:15},()=>({
        x:s.cx+(Math.random()-.5)*38,y:s.cy+(Math.random()-.5)*26,r:1.1+Math.random()*1.7
      }))
    });
  });
})();

// ── CAT ──────────────────────────────────────────────────────────────────
let cat={x:320,y:320,vx:.38,vy:-.25,col:'#8B7355',t:0,dT:0,stopped:false,stopTimer:0};

// ── ROOMBA ────────────────────────────────────────────────────────────────
const RM_R=20;
const rm={x:250,y:80,vx:1.1,vy:0.9,r:RM_R,ang:0,brush:0};

// ── STATE ─────────────────────────────────────────────────────────────────
const SPEEDS=[{spd:1.5,cd:10},{spd:2.8,cd:6},{spd:5.0,cd:3},{spd:9.0,cd:1}];
let speedIdx=0;
let wallVisible=false,endMode=false;
let ptCount=0,endTriggered=false,noiseEverSeen=false,bumpCooldown=0;
let noiseTimer=0;
// ~3 noise out of 100 pts → 1 noise per ~900 frames at base speed
const NOISE_BASE_PERIOD=900;

const pts=[],pulses=[];

function updateCounter(){
  const n=Math.min(ptCount,100);
  document.getElementById('pt-label').textContent=`${n} / 100 pts`;
  document.getElementById('pt-bar').style.width=`${n}%`;
}
function checkEnd(){
  if(ptCount>=100&&!endTriggered){
    endTriggered=true; endMode=true;
    document.getElementById('question-band').style.display='none';
    document.getElementById('spd-cycle').style.display='none';
    document.getElementById('btn-replay').style.display='inline-block';
    document.getElementById('legend-row').style.display='none';
  }
}
function addPoint(px,py,kind){
  if(endTriggered)return;
  px+=(Math.random()-.5)*13; py+=(Math.random()-.5)*13;
  pulses.push({x:px,y:py,age:0,kind});
  setTimeout(()=>{
    if(ptCount>=100)return;
    pts.push({x:px,y:py,kind});
    ptCount++; updateCounter();
    if(kind==='noise'&&!noiseEverSeen){
      noiseEverSeen=true;
      document.getElementById('leg-noise').classList.add('show');
    }
    checkEnd();
  },130);
  bumpCooldown=SPEEDS[speedIdx].cd;
}
function spawnNoise(){
  if(endTriggered)return;
  // Noise appears near the roomba (sensor error = local glitch)
  const ang=Math.random()*Math.PI*2;
  const d=RM_R*1.1+Math.random()*RM_R*2.5;
  const px=Math.max(10,Math.min(W-10, rm.x+Math.cos(ang)*d));
  const py=Math.max(10,Math.min(H-10, rm.y+Math.sin(ang)*d));
  pulses.push({x:px,y:py,age:0,kind:'noise'});
  setTimeout(()=>{
    if(ptCount>=100)return;
    pts.push({x:px,y:py,kind:'noise'}); ptCount++; updateCounter();
    if(!noiseEverSeen){noiseEverSeen=true;document.getElementById('leg-noise').classList.add('show');}
    checkEnd();
  },130);
}

// ── CONTROLS ─────────────────────────────────────────────────────────────
const SPEED_LABELS=['Adjust speed 1×','Adjust speed 2×','Adjust speed 4×','Adjust speed 8×'];
window.cycleSpeed=function(){
  speedIdx=(speedIdx+1)%4;
  document.getElementById('spd-cycle').textContent=SPEED_LABELS[speedIdx];
};
window.toggleWall=function(){
  wallVisible=!wallVisible;
  const btn=document.getElementById('btn-wall');
  btn.textContent=wallVisible?'Hide wall':'Reveal wall';
  btn.style.background=wallVisible?'var(--steel)':'var(--navy)';
};

// ── DRAW HELPERS ──────────────────────────────────────────────────────────
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawFloor(){
  ctx.save();ctx.strokeStyle='rgba(28,43,74,0.05)';ctx.lineWidth=1;
  for(let x=0;x<=W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
}

function drawWall(){
  if(!wallVisible)return;
  ctx.save();
  function seg(t0,t1){
    const A=wPt(t0),B=wPt(t1);
    const dx=wNrm.x*WTHK/2,dy=wNrm.y*WTHK/2;
    ctx.beginPath();
    ctx.moveTo(A.x+dx,A.y+dy);ctx.lineTo(B.x+dx,B.y+dy);
    ctx.lineTo(B.x-dx,B.y-dy);ctx.lineTo(A.x-dx,A.y-dy);
    ctx.closePath();
    ctx.fillStyle=C.navy;ctx.fill();
    ctx.strokeStyle=C.steel;ctx.lineWidth=1.5;ctx.stroke();
  }
  seg(0,DOOR_S);seg(DOOR_E,1);
  [DOOR_S,DOOR_E].forEach(t=>{
    const d=wPt(t);
    ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(74,111,165,0.3)';ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(d.x-wNrm.x*WTHK/2,d.y-wNrm.y*WTHK/2);
    ctx.lineTo(d.x+wNrm.x*WTHK/2,d.y+wNrm.y*WTHK/2);ctx.stroke();
    ctx.setLineDash([]);
  });
  ctx.restore();
}

// ── BEDROOM FURNITURE ─────────────────────────────────────────────────────
function drawBed(){
  const{x,y,w,h}=bed;ctx.save();
  ctx.fillStyle='#5C3D1E';ctx.strokeStyle='#3d2810';ctx.lineWidth=2;
  ctx.beginPath();rr(x,y,w,h,6);ctx.fill();ctx.stroke();
  // Headboard
  ctx.fillStyle='#4a3018';ctx.beginPath();rr(x,y,w,26,5);ctx.fill();
  ctx.fillStyle='#6b4828';ctx.beginPath();rr(x+7,y+4,w-14,16,4);ctx.fill();
  // Mattress
  ctx.fillStyle='#e8ddd2';ctx.beginPath();rr(x+5,y+28,w-10,h-38,4);ctx.fill();
  // Duvet
  ctx.fillStyle='#b8cfe8';ctx.beginPath();rr(x+5,y+50,w-10,h-60,4);ctx.fill();
  ctx.strokeStyle='rgba(80,110,160,0.18)';ctx.lineWidth=0.9;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(x+8,y+56+i*14);ctx.lineTo(x+w-8,y+56+i*14);ctx.stroke();}
  // Pillows
  ctx.fillStyle='#fff';ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=1;
  ctx.beginPath();rr(x+8,y+30,w/2-14,18,5);ctx.fill();ctx.stroke();
  ctx.beginPath();rr(x+w/2+6,y+30,w/2-14,18,5);ctx.fill();ctx.stroke();
  // Footboard
  ctx.fillStyle='#4a3018';ctx.strokeStyle='#3d2810';ctx.lineWidth=1.5;
  ctx.beginPath();rr(x,y+h-13,w,13,4);ctx.fill();ctx.stroke();
  ctx.restore();
}

function drawWardrobe(){
  const{x,y,w,h}=wardrobe;ctx.save();
  ctx.fillStyle='#9b8060';ctx.strokeStyle='#7a6248';ctx.lineWidth=1.5;
  ctx.beginPath();rr(x,y,w,h,3);ctx.fill();ctx.stroke();
  ctx.fillStyle='#b09070';ctx.beginPath();rr(x+3,y+3,w-6,15,2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.14)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x+w/2,y+19);ctx.lineTo(x+w/2,y+h-4);ctx.stroke();
  ctx.fillStyle='#d4b880';
  ctx.beginPath();ctx.arc(x+w/2-6,y+h/2,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+w/2+6,y+h/2,2.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── LIVING ROOM FURNITURE ─────────────────────────────────────────────────
function drawSofa(){
  const{x,y,w,h}=sofa;ctx.save();
  ctx.fillStyle='#3a5a8a';ctx.strokeStyle='#2a4070';ctx.lineWidth=1.5;
  ctx.beginPath();rr(x,y,w,h,7);ctx.fill();ctx.stroke();
  // Backrest at BOTTOM (sofa faces upward toward coffee table)
  ctx.fillStyle='#2e4a7a';ctx.beginPath();rr(x,y+h-20,w,20,6);ctx.fill();
  // Armrests
  ctx.fillStyle='#2e4a7a';ctx.beginPath();rr(x,y,18,h,6);ctx.fill();
  ctx.beginPath();rr(x+w-18,y,18,h,6);ctx.fill();
  // Cushions
  const cw=(w-40)/3;
  for(let i=0;i<3;i++){
    ctx.fillStyle='#4a6a9a';ctx.beginPath();rr(x+20+i*(cw+2),y+6,cw,h-30,5);ctx.fill();
  }
  ctx.restore();
}

function drawPlant(){
  const px=plantBox.x+plantBox.w/2,py=plantBox.y+plantBox.h-20;ctx.save();
  ctx.fillStyle='#a07050';ctx.strokeStyle='#805838';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px-12,py);ctx.lineTo(px+12,py);ctx.lineTo(px+8,py+20);ctx.lineTo(px-8,py+20);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#b88060';ctx.beginPath();rr(px-13,py-4,26,6,2);ctx.fill();
  ctx.fillStyle='#3a2010';ctx.beginPath();rr(px-11,py-2,22,4,1);ctx.fill();
  ctx.strokeStyle='#2d5a18';ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(px,py-2);ctx.lineTo(px,py-60);ctx.stroke();
  [{dy:-18,s:1},{dy:-33,s:-1},{dy:-47,s:1},{dy:-60,s:0}].forEach(({dy,s},i)=>{
    ctx.save();ctx.translate(px+(s*2),py+dy);
    ctx.fillStyle=i===3?'#307525':'#3a8828';
    if(s===0){ctx.beginPath();ctx.ellipse(0,-7,7,11,0,0,Math.PI*2);ctx.fill();}
    else{
      ctx.beginPath();ctx.ellipse(s*15,0,15,6,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#255010';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(s*28,0);ctx.stroke();
    }
    ctx.restore();
  });
  ctx.restore();
}

function drawCoffeeTable(){
  const{x,y,w,h}=coffeeTable;ctx.save();
  ctx.fillStyle='#c0a060';ctx.strokeStyle='#a08040';ctx.lineWidth=1;
  ctx.beginPath();rr(x,y,w,h*0.44,4);ctx.fill();ctx.stroke();
  ctx.fillStyle='#806030';
  [[x+5,y+h*0.44],[x+w-11,y+h*0.44]].forEach(l=>{
    ctx.beginPath();rr(l[0],l[1],6,h*0.56,2);ctx.fill();
  });
  ctx.restore();
}

// ── DUST ──────────────────────────────────────────────────────────────────
function drawDust(){
  for(const dc of dustClusters){
    if(!dc.active)continue;
    for(const d of dc.dots){
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle='rgba(107,122,150,0.28)';ctx.fill();
    }
  }
}

// ── POINTS ────────────────────────────────────────────────────────────────
function ptColor(k){return k==='wall'?C.steel:k==='noise'?C.red:C.muted;}
function drawPoints(){
  for(const p of pts){
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
    if(endMode&&!wallVisible){
      // All grey at end before reveal
      ctx.fillStyle=C.grey;ctx.shadowBlur=0;
    } else if(endMode&&wallVisible&&p.kind==='wall'){
      ctx.fillStyle=C.steel;ctx.shadowColor=C.steel;ctx.shadowBlur=5;
    } else if(endMode&&wallVisible){
      // noise + obj stay grey even after reveal
      ctx.fillStyle=C.grey;ctx.shadowBlur=0;
    } else if(!endMode&&wallVisible&&p.kind==='wall'){
      ctx.fillStyle=C.steel;ctx.shadowColor=C.steel;ctx.shadowBlur=4;
    } else {
      ctx.fillStyle=ptColor(p.kind);ctx.shadowBlur=0;
    }
    ctx.fill();ctx.shadowBlur=0;
  }
}

function drawPulses(){
  for(let i=pulses.length-1;i>=0;i--){
    const p=pulses[i];p.age++;
    const prog=p.age/24;
    if(prog>=1){pulses.splice(i,1);continue;}
    ctx.save();
    ctx.globalAlpha=(1-prog)*0.72;
    ctx.strokeStyle=ptColor(p.kind);ctx.lineWidth=1.3;
    ctx.beginPath();ctx.arc(p.x,p.y,3+prog*16,0,Math.PI*2);ctx.stroke();
    if(prog<0.3){
      ctx.globalAlpha=(1-prog/0.3)*0.82;
      ctx.fillStyle=ptColor(p.kind);
      ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

// ── ROOMBA ────────────────────────────────────────────────────────────────
function drawRoomba(){
  const{x,y,r,ang,brush}=rm;ctx.save();ctx.translate(x,y);
  ctx.beginPath();ctx.ellipse(2,4,r,r*0.58,0,0,Math.PI*2);
  ctx.fillStyle='rgba(28,43,74,0.09)';ctx.fill();
  ctx.rotate(ang);
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle=C.navy;ctx.fill();
  ctx.strokeStyle=C.steel;ctx.lineWidth=1.2;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,r-5,0,Math.PI*2);
  ctx.strokeStyle='rgba(74,111,165,0.18)';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,r,-0.45,0.45);ctx.strokeStyle=C.steel;ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(r-7,0,3.5,0,Math.PI*2);
  ctx.fillStyle=C.red;ctx.shadowColor=C.red;ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fillStyle='#263a5e';ctx.fill();
  ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fillStyle=C.pale;ctx.fill();
  ctx.save();ctx.rotate(brush);
  ctx.strokeStyle='rgba(74,111,165,0.24)';ctx.lineWidth=1.8;ctx.lineCap='round';
  for(let i=0;i<3;i++){
    ctx.save();ctx.rotate(i*Math.PI*2/3);
    ctx.beginPath();ctx.moveTo(4,0);ctx.lineTo(r-2,0);ctx.stroke();ctx.restore();
  }
  ctx.restore();ctx.restore();
}

// ── CAT ───────────────────────────────────────────────────────────────────
function drawCat(){
  cat.t++;
  if(cat.stopped){cat.stopTimer--;if(cat.stopTimer<=0)cat.stopped=false;}
  else{
    cat.dT++;
    if(cat.dT>180+Math.random()*280){
      if(Math.random()<0.28){cat.stopped=true;cat.stopTimer=50+Math.floor(Math.random()*110);}
      else{cat.vx=(Math.random()-.5)*0.5;cat.vy=(Math.random()-.5)*0.5;}
      cat.dT=0;
    }
    cat.x+=cat.vx;cat.y+=cat.vy;
    cat.x=Math.max(22,Math.min(W-22,cat.x));cat.y=Math.max(22,Math.min(H-22,cat.y));
  }
  // roomba push
  const ddx=rm.x-cat.x,ddy=rm.y-cat.y,dd=Math.hypot(ddx,ddy)||1;
  if(dd<rm.r+15){
    const push=rm.r+15-dd+0.5;
    rm.x+=ddx/dd*push;rm.y+=ddy/dd*push;
    const vd=rm.vx*ddx/dd+rm.vy*ddy/dd;
    rm.vx-=2*vd*(ddx/dd);rm.vy-=2*vd*(ddy/dd);
  }
  ctx.save();ctx.translate(cat.x,cat.y);ctx.fillStyle=cat.col;
  ctx.beginPath();ctx.ellipse(0,4,13,9,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-7,7,6,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(-7,-11);ctx.lineTo(-10,-18);ctx.lineTo(-3,-13);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(7,-11);ctx.lineTo(10,-18);ctx.lineTo(3,-13);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(200,110,110,0.42)';
  ctx.beginPath();ctx.moveTo(-6,-12);ctx.lineTo(-8.5,-17);ctx.lineTo(-4,-13);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(6,-12);ctx.lineTo(8.5,-17);ctx.lineTo(4,-13);ctx.closePath();ctx.fill();
  ctx.fillStyle='#4a9a4a';
  ctx.beginPath();ctx.ellipse(-2.5,-7.5,2,1.4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(2.5,-7.5,2,1.4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(-2.5,-7.5,0.8,1.2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(2.5,-7.5,0.8,1.2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e09090';ctx.beginPath();ctx.arc(0,-5,1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=0.7;
  [[-1,-.3],[-.5,0],[-.8,.3]].forEach(([a,b])=>{
    ctx.beginPath();ctx.moveTo(-1,-5);ctx.lineTo(-1+a*9,-5+b*3.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(1,-5);ctx.lineTo(1-a*9,-5+b*3.5);ctx.stroke();
  });
  const sw=cat.stopped?Math.sin(cat.t*0.07)*1.3:Math.sin(cat.t*0.03)*0.5;
  ctx.strokeStyle=cat.col;ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(11,4);ctx.quadraticCurveTo(20+sw*5,sw*8,16,-9+sw*3);ctx.stroke();
  ctx.restore();
}

// ── END OVERLAY ───────────────────────────────────────────────────────────
function drawEndOverlay(){
  if(!endMode)return;
  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=C.navy;
  ctx.font="italic 22px 'DM Serif Display', serif";
  ctx.globalAlpha=0.88;
  ctx.fillText('Can you guess where the wall is',W/2,H/2-16);
  ctx.fillText('using these collected data points?',W/2,H/2+16);
  ctx.globalAlpha=1;
  ctx.restore();
}

// ── COLLISION HELPERS ─────────────────────────────────────────────────────
function collideWall(){
  const{t,dist}=projWall(rm.x,rm.y);
  if(t<-0.02||t>1.02)return;
  if(inDoor(t))return;
  const minD=WTHK/2+rm.r;
  if(Math.abs(dist)<minD){
    const sg=dist>=0?1:-1;
    const push=minD-Math.abs(dist)+0.5;
    rm.x+=wNrm.x*sg*push;rm.y+=wNrm.y*sg*push;
    const vdn=rm.vx*wNrm.x+rm.vy*wNrm.y;
    rm.vx-=2*vdn*wNrm.x;rm.vy-=2*vdn*wNrm.y;
    if(bumpCooldown<=0){
      const wp=wPt(Math.max(0,Math.min(1,t)));
      addPoint(wp.x,wp.y,'wall');
    }
  }
}
function collideAABB(rx,ry,rw,rh,kind){
  const nx=Math.max(rx,Math.min(rx+rw,rm.x));
  const ny=Math.max(ry,Math.min(ry+rh,rm.y));
  const dx=rm.x-nx,dy=rm.y-ny,d=Math.hypot(dx,dy)||1;
  if(d<rm.r+2){
    const push=rm.r+2-d+0.5,nnx=dx/d,nny=dy/d;
    rm.x+=nnx*push;rm.y+=nny*push;
    const vd=rm.vx*nnx+rm.vy*nny;
    rm.vx-=2*vd*nnx;rm.vy-=2*vd*nny;
    if(bumpCooldown<=0)addPoint(nx,ny,kind);
  }
}

// ── UPDATE ROOMBA ─────────────────────────────────────────────────────────
// Stuck detection: sample position every 90 frames; if displacement < threshold, kick
let stuckTimer=0, stuckLastX=rm.x, stuckLastY=rm.y;
const STUCK_WINDOW=90, STUCK_THRESH=40;

function updateRoomba(){
  const SPD=SPEEDS[speedIdx].spd;
  const mag=Math.hypot(rm.vx,rm.vy)||1;
  rm.vx=(rm.vx/mag)*SPD;rm.vy=(rm.vy/mag)*SPD;
  rm.x+=rm.vx;rm.y+=rm.vy;
  rm.ang+=0.016+speedIdx*0.008;
  rm.brush-=0.065+speedIdx*0.03;
  if(bumpCooldown>0)bumpCooldown--;
  const r=rm.r;
  if(rm.x<r){rm.vx=Math.abs(rm.vx);rm.x=r;}
  if(rm.x>W-r){rm.vx=-Math.abs(rm.vx);rm.x=W-r;}
  if(rm.y<r){rm.vy=Math.abs(rm.vy);rm.y=r;}
  if(rm.y>H-r){rm.vy=-Math.abs(rm.vy);rm.y=H-r;}
  collideAABB(bed.x,bed.y,bed.w,bed.h,'obj');
  collideAABB(wardrobe.x,wardrobe.y,wardrobe.w,wardrobe.h,'obj');
  collideAABB(sofa.x,sofa.y,sofa.w,sofa.h,'obj');
  collideAABB(coffeeTable.x,coffeeTable.y,coffeeTable.w,coffeeTable.h,'obj');
  collideAABB(plantBox.x,plantBox.y,plantBox.w,plantBox.h,'obj');
  collideWall();
  // clean dust
  for(const dc of dustClusters){
    if(!dc.active)continue;
    if(Math.hypot(rm.x-dc.cx,rm.y-dc.cy)<rm.r+20)dc.active=false;
  }
  // sparse noise
  noiseTimer++;
  const period=Math.round(NOISE_BASE_PERIOD/SPEEDS[speedIdx].spd);
  if(noiseTimer>=period){noiseTimer=0;spawnNoise();}

  // Stuck detection: if Roomba hasn't traveled far enough in STUCK_WINDOW frames, kick it
  stuckTimer++;
  if(stuckTimer>=STUCK_WINDOW){
    const dist=Math.hypot(rm.x-stuckLastX,rm.y-stuckLastY);
    if(dist<STUCK_THRESH){
      // Random kick toward canvas centre with some randomness
      const ang=Math.random()*Math.PI*2;
      rm.vx=Math.cos(ang);rm.vy=Math.sin(ang);
    }
    stuckLastX=rm.x;stuckLastY=rm.y;
    stuckTimer=0;
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
  drawFloor();
  if(!endMode){
    drawDust();
    drawWardrobe();
    drawBed();
    drawSofa();
    drawCoffeeTable();
    drawPlant();
  }
  drawWall();
  drawPoints();
  if(!endMode){
    drawPulses();
    drawCat();
    drawRoomba();
    updateRoomba();
  }
  drawEndOverlay();
  requestAnimationFrame(loop);
}
loop();
})();
</script>
