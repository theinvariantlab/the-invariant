<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Recovery — Fourier Order</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #f0ede8;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 48px 0;
}
.hdr {
  width: 100%;
  padding: 14px 32px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .18em;
  color: #8a96aa;
  text-transform: uppercase;
  border-bottom: 1px solid #d4d0c8;
  background: #f0ede8;
}
.wrap { width: 100%; max-width: 800px; padding: 0 20px; }

/* ── canvas wrapper ── */
.canvas-wrap {
  position: relative;
  width: 100%;
  margin-top: 28px;
  border-radius: 4px;
  overflow: hidden;
}
canvas#c { display: block; width: 100%; border-radius: 4px; }

/* ── overlay boxes on canvas ── */
.overlay-box {
  position: absolute;
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  display: flex;
  align-items: center;
  padding: 0 14px 0 10px;
  height: 40px;
  border-radius: 5px;
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}
.overlay-box.visible { opacity: 1; transform: translateY(0); }

/* box colors matching steps_anim palette */
#ob-pb  { background: rgba(52,72,108,.88); }
#ob-s1  { background: rgba(65,88,130,.84); }
#ob-s2  { background: rgba(72,100,152,.80); }
#ob-s3  { background: rgba(78,114,174,.76); }
#ob-eta { background: rgba(38,58,90,.92); border: 1px solid rgba(120,200,255,.3); }

.ob-num {
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,.9);
  margin-right: 9px;
  min-width: 13px;
  flex-shrink: 0;
}
.ob-math .katex { font-size: 13px !important; }
.ob-math span,
.ob-math .katex span { color: rgba(255,255,255,.96) !important; border: none !important; box-shadow: none !important; }
.ob-math .katex .frac-line,
.ob-math .katex .sqrt-line,
.ob-math .katex .overline-line { background-color: rgba(255,255,255,.96) !important; }

.ob-desc {
  font-size: 9.5px;
  color: rgba(180,205,240,.65);
  font-style: italic;
  margin-left: 11px;
  flex-shrink: 0;
}
.ob-check {
  color: rgba(80,240,140,.88);
  font-style: normal;
  font-weight: 500;
  letter-spacing: .04em;
}

/* arrow canvas overlay */
#arrow-canvas {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
}

/* ── N question ── */
.n-question {
  margin-top: 22px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: .04em;
  color: #3a4a60;
}
.n-question em {
  font-style: italic;
  color: #1a2a40;
  font-weight: 500;
}

/* ── N selector ── */
.n-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.n-label {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: .08em;
  color: #8a96aa;
  white-space: nowrap;
}
.n-btn {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  padding: 6px 15px;
  border-radius: 4px;
  border: 1.5px solid #d4d0c8;
  background: transparent;
  color: #6b7a96;
  cursor: pointer;
  transition: background .18s, color .18s, border-color .18s, box-shadow .18s;
}
.n-btn:hover { background: rgba(80,120,180,.07); border-color: #a0aabb; color: #3a4a6a; }
.n-btn.active-warn { background: rgba(255,210,80,.12); border-color: rgba(255,210,80,.6); color: #7a5a00; box-shadow: 0 0 0 2px rgba(255,210,80,.15); }
.n-btn.active-good { background: rgba(80,185,255,.12); border-color: rgba(80,185,255,.6); color: #1a4a7a; box-shadow: 0 0 0 2px rgba(80,185,255,.15); }
.n-btn.active-bad  { background: rgba(215,70,60,.10);  border-color: rgba(215,70,60,.55); color: #7a1a18; box-shadow: 0 0 0 2px rgba(215,70,60,.12); }

/* ── legend ── */
.legend {
  display: flex;
  gap: 20px;
  margin-top: 10px;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .06em;
  color: #8a96aa;
}
.leg-swatch { width: 22px; height: 2.5px; border-radius: 2px; }

/* ── bottom phrase ── */
.bottom-phrase {
  margin-top: 16px;
  font-size: 12.5px;
  line-height: 1.65;
  color: #6b7a96;
  font-style: italic;
  border-left: 3px solid #d4d0c8;
  padding-left: 14px;
  transition: border-color .4s, color .4s;
  min-height: 22px;
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.bottom-phrase.state-good { border-color: rgba(80,185,255,.55); color: #3a5a7a; }
.bottom-phrase.state-bad  { border-color: rgba(215,70,60,.5);  color: #6a2a28; }
.bottom-phrase.state-warn { border-color: rgba(255,210,80,.5); color: #5a4a20; }

.verdict {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-style: normal;
  font-weight: 500;
  letter-spacing: .06em;
  padding: 2px 8px;
  border-radius: 3px;
  flex-shrink: 0;
}
.verdict-good { background: rgba(80,185,255,.12); color: #1a4a7a; border: 1px solid rgba(80,185,255,.3); }
.verdict-meh  { background: rgba(255,210,80,.12); color: #7a5a00; border: 1px solid rgba(255,210,80,.4); }
.verdict-bad  { background: rgba(215,70,60,.10);  color: #7a1a18; border: 1px solid rgba(215,70,60,.35); }
</style>
</head>
<body>
<div class="hdr">The Invariant &nbsp;·&nbsp; Wave recovery &nbsp;·&nbsp; Fourier order N</div>
<div class="wrap">

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c" width="1400" height="560"></canvas>
    <canvas id="arrow-canvas" width="1400" height="560"></canvas>

    <!-- overlay step boxes — positioned by JS after layout -->
    <div class="overlay-box" id="ob-pb">
      <span class="ob-math" id="ob-pb-math"></span>
    </div>

    <div class="overlay-box" id="ob-s1">
      <span class="ob-num">①</span>
      <span class="ob-math" id="ob-s1-math"></span>
      <span class="ob-desc ob-check">✓ deduced</span>
    </div>

    <div class="overlay-box" id="ob-s2">
      <span class="ob-num">②</span>
      <span class="ob-math" id="ob-s2-math"></span>
      <span class="ob-desc ob-check">✓ computed</span>
    </div>

    <div class="overlay-box" id="ob-s3">
      <span class="ob-num">③</span>
      <span class="ob-math" id="ob-s3-math"></span>
      <span class="ob-desc">estimated surface for your N</span>
    </div>

  </div>

  <!-- N selector -->
  <div class="n-question">Higher <em>N</em> → more precision?</div>
  <div class="n-row">
    <span class="n-label">N =</span>
    <button class="n-btn" data-i="0">5</button>
    <button class="n-btn" data-i="1">10</button>
    <button class="n-btn" data-i="2">20</button>
    <button class="n-btn" data-i="3">40</button>
    <button class="n-btn" data-i="4">100</button>
  </div>

  <div class="legend">
    <div class="leg-item">
      <div class="leg-swatch" style="background:rgba(160,255,210,.95)"></div>
      true surface
    </div>
    <div class="leg-item">
      <div class="leg-swatch" style="background:rgba(255,210,80,.9)" id="legRec"></div>
      recovered (N terms)
    </div>
  </div>

  <div class="bottom-phrase" id="bottomPhrase">Choose N to begin the reconstruction.</div>

</div>

  ctx.strokeStyle = 'rgba(160,255,210,.95)'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.globalAlpha = 1;

  // Recovered surface — only drawn when revealRec is true
  if (idx === null || !revealRec) return;

  const eta = DATA.eta[idx];
  const bad = STATES[idx].cls === 'state-bad';
  let lineCol, glowCol, lw;
  if (STATES[idx].cls === 'state-good') {
    lineCol = 'rgba(255,210,80,.92)'; glowCol = 'rgba(255,210,80,.22)'; lw = 2.5;
  } else if (bad) {
    lineCol = 'rgba(215,75,65,.88)'; glowCol = 'rgba(215,75,65,.18)'; lw = 1.8;
  } else {
    lineCol = 'rgba(255,210,80,.78)'; glowCol = 'rgba(255,210,80,.14)'; lw = 2;
  }

  if (bad) {
    ctx.strokeStyle = lineCol; ctx.lineWidth = lw;
    let inSeg = false; ctx.beginPath();
    for (let i = 0; i < xArr.length; i++) {
      if (Math.abs(eta[i] - STUCK) < 1e-7) { inSeg = false; continue; }
      const px = cx(xArr[i]), py = cy(eta[i]);
      if (!inSeg) { ctx.moveTo(px, py); inSeg = true; } else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.fillStyle = 'rgba(215,75,65,.25)';
    for (let i = 0; i < xArr.length; i++) {
      if (Math.abs(eta[i] - STUCK) < 1e-7) {
        ctx.beginPath(); ctx.arc(cx(xArr[i]), cy(STUCK), 2.2, 0, Math.PI * 2); ctx.fill();
      }
    }
  } else {
    ctx.beginPath();
    for (let i = 0; i < xArr.length; i++) i === 0 ? ctx.moveTo(cx(xArr[i]), cy(eta[i])) : ctx.lineTo(cx(xArr[i]), cy(eta[i]));
    ctx.strokeStyle = glowCol; ctx.lineWidth = 10; ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i < xArr.length; i++) i === 0 ? ctx.moveTo(cx(xArr[i]), cy(eta[i])) : ctx.lineTo(cx(xArr[i]), cy(eta[i]));
    ctx.strokeStyle = lineCol; ctx.lineWidth = lw; ctx.stroke();
  }
}

// Idle animation
let rafId = null;
let revealingRec = false;
function startIdleAnim() {
  if (rafId) return;
  let start = null;
  function frame(ts) {
    if (!start) start = ts;
    animT = ts - start;
    drawScene(currentIdx, revealingTrue, revealingRec);
    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
}
startIdleAnim();

// ══════════════════════════════════════════════════════════
// p_b formula builder
// ══════════════════════════════════════════════════════════
function buildPbFormula(N) {
  const MAX_SHOW = 3;
  const show = Math.min(N, MAX_SHOW);
  let tex = 'p_b(x) \\;=\\; \\underbrace{1.000}_{gd}';

  for (let n = 1; n <= show; n++) {
    const c = PB_COEFFS[n - 1];
    if (Math.abs(c) < 5e-7) continue;
    const sign = c >= 0 ? '+' : '-';
    const val = Math.abs(c).toFixed(6);
    const arg = n === 1 ? 'kx' : `${n}kx`;
    tex += ` \\; ${sign} \\; ${val}\\cos(${arg})`;
  }

  if (N > MAX_SHOW) {
    let hasMore = false;
    for (let n = MAX_SHOW + 1; n <= Math.min(N, 10); n++) {
      if (Math.abs(PB_COEFFS[n - 1] || 0) > 5e-7) { hasMore = true; break; }
    }
    tex += hasMore ? ' \\;+\\; \\cdots' : ' \\;+\\; \\underbrace{\\cdots}_{\\approx\\,0}';
  }

  // render with chosen N highlighted
  tex += `\\quad \\scriptstyle{(N=${N})}`;
  return tex;
}

function rk(id, tex) {
  const el = document.getElementById(id);
  if (el) katex.render(tex, el, { throwOnError: false, displayMode: false });
}

// ══════════════════════════════════════════════════════════
// Overlay box positioning
// ══════════════════════════════════════════════════════════
// Positions as fractions of canvas rendered height
// pb: near bottom (sensor data layer)
// s1: lower-mid (fluid column)
// s2: mid-upper (surface integral)
// s3: upper (wave profile result)

function positionBoxes() {
  const wrap = document.getElementById('canvasWrap');
  const rect = wrap.getBoundingClientRect();
  const scale = rect.width / W; // canvas CSS scale factor

  const boxes = [
    { id: 'ob-pb', yFrac: 0.84, xPx: 40 },
    { id: 'ob-s1', yFrac: 0.66, xPx: 40 },
    { id: 'ob-s2', yFrac: 0.46, xPx: 40 },
    { id: 'ob-s3', yFrac: 0.18, xPx: 40 },
  ];
  boxes.forEach(({ id, yFrac, xPx }) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.left = (xPx * scale) + 'px';
    el.style.top = (yFrac * rect.height - 20) + 'px';
    el.style.height = (40 * scale) + 'px';
    el.style.fontSize = (11 * scale) + 'px';
  });

  // arrow canvas size
  const ac = document.getElementById('arrow-canvas');
  ac.style.width = rect.width + 'px';
  ac.style.height = rect.height + 'px';
}

// ══════════════════════════════════════════════════════════
// Arrows on overlay canvas
// ══════════════════════════════════════════════════════════
const ac = document.getElementById('arrow-canvas');
const actx = ac.getContext('2d');

const arrowState = { a01: 0, a12: 0, a23: 0 };

function drawArrows() {
  actx.clearRect(0, 0, ac.width, ac.height);
  const wrap = document.getElementById('canvasWrap');
  const rect = wrap.getBoundingClientRect();
  const scale = rect.width / W;

  const xOff = 120 * scale; // arrow x position
  const positions = [
    { y0: 0.84, y1: 0.66, key: 'a01' },
    { y0: 0.66, y1: 0.46, key: 'a12' },
    { y0: 0.46, y1: 0.18, key: 'a23' },
  ];

  positions.forEach(({ y0, y1, key }) => {
    const alpha = arrowState[key];
    if (alpha <= 0) return;
    actx.globalAlpha = alpha;
    const startY = y0 * rect.height - 2;
    const endY = y1 * rect.height + 38 * scale;
    actx.strokeStyle = 'rgba(120,200,255,.85)';
    actx.lineWidth = 1.5 * scale;
    actx.beginPath();
    actx.moveTo(xOff, startY);
    actx.lineTo(xOff, endY);
    actx.stroke();
    // arrowhead
    actx.fillStyle = 'rgba(120,200,255,.85)';
    actx.beginPath();
    actx.moveTo(xOff - 5 * scale, endY - 8 * scale);
    actx.lineTo(xOff, endY);
    actx.lineTo(xOff + 5 * scale, endY - 8 * scale);
    actx.fill();
    actx.globalAlpha = 1;
  });
}

function fadeArrow(key, toAlpha, dur, cb) {
  const from = arrowState[key];
  const start = performance.now();
  function go(ts) {
    const p = Math.min(1, (ts - start) / dur);
    arrowState[key] = from + (toAlpha - from) * p;
    drawArrows();
    if (p < 1) requestAnimationFrame(go);
    else if (cb) cb();
  }
  requestAnimationFrame(go);
}

// ══════════════════════════════════════════════════════════
// Step sequence logic
// ══════════════════════════════════════════════════════════
let currentIdx = null;
let revealingTrue = false;
let stepTimers = [];

function clearAll() {
  stepTimers.forEach(clearTimeout);
  stepTimers = [];
  ['ob-pb', 'ob-s1', 'ob-s2', 'ob-s3'].forEach(id => {
    document.getElementById(id).classList.remove('visible');
  });
  arrowState.a01 = 0; arrowState.a12 = 0; arrowState.a23 = 0;
  drawArrows();
  revealingTrue = false;
  revealingRec = false;
}

function showSequence(idx) {
  clearAll();
  positionBoxes();

  const N = DATA.N_values[idx];
  const st = STATES[idx];
  const bad = st.cls === 'state-bad';

  // Render p_b formula with this N
  rk('ob-pb-math', buildPbFormula(N));

  // t=150ms: p_b box appears
  stepTimers.push(setTimeout(() => {
    document.getElementById('ob-pb').classList.add('visible');
  }, 150));

  // t=900ms: arrow → ① B(z)
  stepTimers.push(setTimeout(() => {
    fadeArrow('a01', 1, 380, () => {
      document.getElementById('ob-s1').classList.add('visible');
    });
  }, 900));

  // t=1800ms: arrow → ② D_s(z)
  stepTimers.push(setTimeout(() => {
    fadeArrow('a12', 1, 380, () => {
      document.getElementById('ob-s2').classList.add('visible');
    });
  }, 1800));

  // t=2700ms: arrow → ③ η — box appears first
  stepTimers.push(setTimeout(() => {
    fadeArrow('a23', 1, 380, () => {
      const s3 = document.getElementById('ob-s3');
      const s3math = document.getElementById('ob-s3-math');
      if (bad) {
        katex.render(`\\eta(x),\\; N=${N}`, s3math, { throwOnError: false });
        s3.style.background = 'rgba(110,28,22,.90)';
        s3.style.border = '1px solid rgba(215,75,65,.45)';
      } else {
        katex.render(`\\eta(x),\\; N=${N}`, s3math, { throwOnError: false });
        s3.style.background = 'rgba(38,58,90,.92)';
        s3.style.border = '1px solid rgba(120,200,255,.3)';
      }
      s3.classList.add('visible');

      // ← recovered curve appears here, right after the η box
      setTimeout(() => { revealingRec = true; }, 350);
    });
  }, 2700));

  // t=3900ms: arrows fade out
  stepTimers.push(setTimeout(() => {
    ['a01','a12','a23'].forEach(k => fadeArrow(k, 0, 500));
  }, 3900));

  // t=4800ms: true wave reveals + legend + verdict phrase
  stepTimers.push(setTimeout(() => {
    revealingTrue = true;
    document.getElementById('legRec').style.background =
      bad ? 'rgba(215,75,65,.88)' : 'rgba(255,210,80,.9)';
    const phrase = document.getElementById('bottomPhrase');
    phrase.className = 'bottom-phrase ' + st.cls;
    phrase.innerHTML = `<span class="verdict ${st.verdictCls}">${st.verdict}</span><span>${st.phrase}</span>`;
  }, 4800));
}

// ══════════════════════════════════════════════════════════
// KaTeX init
// ══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  rk('ob-s1-math', '\\mathcal{B}(z) = gd + \\displaystyle\\sum_n \\frac{\\hat{p}_n\\,e^{inkz}}{e^{nkd}}');
  rk('ob-s2-math', '\\mathcal{D}_s(z)');

  positionBoxes();
  drawScene(null, false, false);

  window.addEventListener('resize', () => {
    positionBoxes();
    drawArrows();
  });
});

// ══════════════════════════════════════════════════════════
// Button logic
// ══════════════════════════════════════════════════════════
document.querySelectorAll('.n-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = parseInt(btn.dataset.i);
    if (idx === currentIdx) return;
    currentIdx = idx;

    document.querySelectorAll('.n-btn').forEach(b => {
      b.className = 'n-btn' + (b === btn ? ' ' + STATES[idx].btnCls : '');
    });

    showSequence(idx);
  });
});
