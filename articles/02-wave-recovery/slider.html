<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Recovery — The Invariant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F4EF;
    --bg2: #EDE9E2;
    --ink: #1A1714;
    --ink2: #5C5650;
    --ink3: #9C9790;
    --blue: #1B4F8A;
    --blue-light: #4A7EC7;
    --blue-pale: #C8DAEF;
    --red: #B23A2A;
    --red-pale: #F0D8D4;
    --gold: #C49A3C;
    --good: #2A7A4A;
    --good-pale: #D4EAD8;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 18px;
    line-height: 1.6;
    padding: 40px 24px 60px;
    max-width: 720px;
    margin: 0 auto;
  }

  .label-mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
  }

  /* ── Canvas area ── */
  .viz-wrap {
    background: white;
    border: 1px solid var(--bg2);
    border-radius: 4px;
    padding: 28px 28px 20px;
    margin: 32px 0 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ── Slider ── */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 20px;
  }

  .slider-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink2);
    white-space: nowrap;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: var(--bg2);
    border-radius: 1px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--blue);
    border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .n-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--blue);
    min-width: 48px;
    text-align: right;
  }

  /* ── Error bar ── */
  .error-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 3px;
  }

  .error-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink3); }
  .error-bar-track {
    flex: 1;
    height: 6px;
    background: var(--bg2);
    border-radius: 3px;
    overflow: hidden;
  }
  .error-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.2s, background 0.3s;
    background: var(--good);
  }
  .error-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    min-width: 90px;
    text-align: right;
    color: var(--ink2);
  }

  /* ── Status badge ── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 10px;
    transition: background 0.3s, color 0.3s;
  }
  .status-badge.good { background: var(--good-pale); color: var(--good); }
  .status-badge.warn { background: #FFF3CD; color: #856404; }
  .status-badge.bad  { background: var(--red-pale); color: var(--red); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── Caption ── */
  .caption {
    font-size: 14px;
    color: var(--ink3);
    margin-top: 10px;
    font-style: italic;
    line-height: 1.5;
  }
</style>
</head>
<body>

<p class="label-mono">Interactive — drag the slider</p>

<div class="viz-wrap">
  <canvas id="c" width="660" height="280"></canvas>

  <div class="slider-row">
    <span class="slider-label">N =</span>
    <input type="range" id="slider" min="1" max="60" value="8" step="1">
    <span class="n-display" id="nval">8</span>
  </div>

  <div class="error-row">
    <span class="error-label">Max error</span>
    <div class="error-bar-track"><div class="error-bar-fill" id="errbar" style="width:2%"></div></div>
    <span class="error-val" id="errval">—</span>
  </div>

  <div>
    <span class="status-badge good" id="badge"><span class="dot"></span><span id="badge-text">Reconstruction converging</span></span>
  </div>
</div>

<p class="caption">
  The true wave profile (dark) versus the Fourier reconstruction (blue) using <em>N</em> terms.
  Below N&nbsp;≈&nbsp;16, adding terms improves the fit. Beyond that, floating-point amplification destroys the signal.
</p>

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('slider');
const nval = document.getElementById('nval');
const errbar = document.getElementById('errbar');
const errval = document.getElementById('errval');
const badge = document.getElementById('badge');
const badgeText = document.getElementById('badge-text');

const W = canvas.width, H = canvas.height;
const PAD = { top: 28, right: 20, bottom: 36, left: 52 };
const plotW = W - PAD.left - PAD.right;
const plotH = H - PAD.top - PAD.bottom;

const x = RAW.x;
const etaTrue = RAW.eta_true;
const errors = RAW.errors;
const recons = RAW.reconstructions;

// y domain: -0.5 to 0.5 (wave amplitudes)
const Y_MIN = -0.55, Y_MAX = 0.55;
const X_MIN = Math.min(...x), X_MAX = Math.max(...x);

function toCanvas(xi, yi) {
  return [
    PAD.left + (xi - X_MIN) / (X_MAX - X_MIN) * plotW,
    PAD.top + (1 - (yi - Y_MIN) / (Y_MAX - Y_MIN)) * plotH
  ];
}

function drawGrid() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#F0EDE8';
  ctx.lineWidth = 1;
  const yTicks = [-0.4, -0.2, 0, 0.2, 0.4];
  yTicks.forEach(y => {
    const [, cy] = toCanvas(0, y);
    ctx.beginPath();
    ctx.moveTo(PAD.left, cy);
    ctx.lineTo(PAD.left + plotW, cy);
    ctx.stroke();
  });

  // Zero line slightly stronger
  const [, cy0] = toCanvas(0, 0);
  ctx.strokeStyle = '#DDD9D2';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD.left, cy0);
  ctx.lineTo(PAD.left + plotW, cy0);
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#9C9790';
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'right';
  yTicks.forEach(y => {
    const [, cy] = toCanvas(0, y);
    ctx.fillText(y === 0 ? '0' : y.toFixed(1), PAD.left - 8, cy + 4);
  });

  // x ticks
  ctx.textAlign = 'center';
  [0, 1, 2, 3, 4, 5].forEach(xi => {
    const [cx, ] = toCanvas(xi, 0);
    if (cx >= PAD.left && cx <= PAD.left + plotW) {
      ctx.fillText(xi, cx, H - PAD.bottom + 16);
    }
  });

  // Axis labels
  ctx.fillStyle = '#9C9790';
  ctx.font = '11px EB Garamond, serif';
  ctx.textAlign = 'left';
  ctx.fillText('η (m)', 4, PAD.top - 8);
  ctx.textAlign = 'center';
  ctx.fillText('x (wavelengths)', PAD.left + plotW/2, H - 4);
}

function drawCurve(xs, ys, color, lineWidth, dashed) {
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  if (dashed) ctx.setLineDash([5, 4]);
  else ctx.setLineDash([]);

  for (let i = 0; i < xs.length; i++) {
    const [cx, cy] = toCanvas(xs[i], ys[i]);
    if (i === 0) ctx.moveTo(cx, cy);
    else ctx.lineTo(cx, cy);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

function formatError(e) {
  if (e < 1e-4) return e.toExponential(2);
  if (e < 100) return e.toFixed(4);
  return e.toExponential(2);
}

function getStatus(N, err) {
  if (N <= 16 && err < 1e-3) return 'good';
  if (err < 0.05) return 'warn';
  return 'bad';
}

function render(N) {
  drawGrid();

  const recon = recons[String(N)];
  const err = errors[N - 1];

  // True wave — dark ink
  drawCurve(x, etaTrue, '#1A1714', 2.5, false);

  // Reconstruction — blue
  const status = getStatus(N, err);
  const color = status === 'good' ? '#1B4F8A' : status === 'warn' ? '#C49A3C' : '#B23A2A';
  drawCurve(x, recon, color, 1.8, false);

  // Legend
  ctx.font = '13px EB Garamond, serif';
  ctx.fillStyle = '#1A1714';
  ctx.textAlign = 'left';
  ctx.fillText('▬ true surface', PAD.left + 8, PAD.top + 16);
  ctx.fillStyle = color;
  ctx.fillText('▬ reconstruction', PAD.left + 130, PAD.top + 16);

  // Update error display
  const logErr = Math.log10(Math.max(err, 1e-10));
  const logMin = Math.log10(1e-7);
  const logMax = Math.log10(1e8);
  const pct = Math.min(100, Math.max(1, (logErr - logMin) / (logMax - logMin) * 100));

  errbar.style.width = pct + '%';
  errbar.style.background = status === 'good' ? '#2A7A4A' : status === 'warn' ? '#C49A3C' : '#B23A2A';
  errval.textContent = formatError(err);

  badge.className = 'status-badge ' + status;
  if (status === 'good') badgeText.textContent = 'Reconstruction converging';
  else if (status === 'warn') badgeText.textContent = 'Signal degrading';
  else badgeText.textContent = 'Reconstruction collapsed';
}

slider.addEventListener('input', () => {
  const N = parseInt(slider.value);
  nval.textContent = N;
  render(N);
});

render(8);
</script>
